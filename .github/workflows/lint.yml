name: CI Lint & Test Gate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  php-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Syntax Check (PHP Lint)
        run: |
          find metricpulse -name "*.php" -exec php -l {} \;

      - name: Install Dependencies
        working-directory: metricpulse
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPUnit Tests
        working-directory: metricpulse
        run: vendor/bin/phpunit
