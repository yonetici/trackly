name: CI Lint & Test Gate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  php-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: phpunit

      - name: Syntax Check (PHP Lint)
        run: |
          find trackly -name "*.php" -exec php -l {} \;

      - name: Run PHPUnit Tests
        run: |
          cd trackly && phpunit
