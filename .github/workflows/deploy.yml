name: Deploy to WordPress.org SVN

# Publishes to the WordPress.org SVN repository when a GitHub release is published,
# or manually via the Actions tab (Run workflow). Requires the repository secrets
# WPORG_SVN_USERNAME and WPORG_SVN_PASSWORD (set in Settings -> Secrets and variables).
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Single source of truth for the SVN tag: the "Stable tag" line in readme.txt.
      - name: Resolve version from readme.txt
        id: ver
        run: |
          VERSION="$(grep -m1 '^Stable tag:' datametric-analytics-heatmaps/readme.txt | sed 's/^Stable tag:[[:space:]]*//' | tr -d '[:space:]')"
          echo "Resolved version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # Build a clean copy containing ONLY the files that should ship to WordPress.org.
      # This is deterministic and independent of how the deploy action handles .distignore
      # for a custom BUILD_DIR.
      - name: Prepare clean build
        run: |
          rsync -a --delete \
            --exclude='tests/' \
            --exclude='phpunit.xml' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='node_modules/' \
            --exclude='vendor/' \
            --exclude='.distignore' \
            --exclude='.phpunit.result.cache' \
            --exclude='.DS_Store' \
            datametric-analytics-heatmaps/ build/
          echo "Files staged for SVN trunk:" && find build -type f | sort

      - name: WordPress.org Plugin Deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ secrets.WPORG_SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.WPORG_SVN_PASSWORD }}
          SLUG: datametric-analytics-heatmaps
          VERSION: ${{ steps.ver.outputs.version }}
          ASSETS_DIR: assets
          BUILD_DIR: build
