name: Deploy to WordPress.org SVN

# Publishes to the WordPress.org SVN repository when a GitHub release is published,
# or manually via the Actions tab (Run workflow). Requires the repository secrets
# WPORG_SVN_USERNAME and WPORG_SVN_PASSWORD (set in Settings -> Secrets and variables).
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: WordPress.org Plugin Deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ secrets.WPORG_SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.WPORG_SVN_PASSWORD }}
          SLUG: datametric-analytics-heatmaps
          ASSETS_DIR: assets
          BUILD_DIR: datametric-analytics-heatmaps
